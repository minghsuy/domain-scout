# Ground truth labels for domain-scout evaluation harness.
# Each entry maps a (company, seeds) pair to known-owned and known-not-owned domains.
# "owned" means the domain is legitimately operated by / affiliated with the company.
# "not_owned" means the domain appeared in results but is a false positive (CDN, shared cert, etc.).
# Domains not in either list are treated as "unknown" — conservative precision counts them against.
#
# Sources: CT log cert_events data (ct-entity-resolution, 2026-02-19/20, ~1.7M rows),
# cross-referenced with public corporate subsidiary records and WHOIS/RDAP.

